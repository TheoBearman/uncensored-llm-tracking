name: Publish site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "snapshots/index.json"
      - "snapshots/**/summary.json"
      - "snapshots/**/deltas.json"
      - ".github/workflows/publish-site.yml"
  # Snapshot commits are made by github-actions[bot] using GITHUB_TOKEN, which
  # GitHub deliberately does NOT use to trigger downstream `push` workflows
  # (anti-loop guard). Catch them via workflow_run instead.
  workflow_run:
    workflows: ["Weekly snapshot"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # When triggered by workflow_run, only deploy if the upstream succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Assemble site payload
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p _site _site/snapshots
          cp -r site/* _site/

          # Copy the index, or write an empty one if no snapshots exist yet.
          if [ -f snapshots/index.json ]; then
            cp snapshots/index.json _site/snapshots/index.json
          else
            echo '{"snapshots":[]}' > _site/snapshots/index.json
          fi

          # Copy per-day summary/deltas (NOT the parquet/raw — too big for Pages).
          # nullglob makes the loop a no-op when snapshots/ is missing or empty.
          if [ -d snapshots ]; then
            for dir in snapshots/*/; do
              d=$(basename "$dir")
              mkdir -p "_site/snapshots/$d"
              [ -f "$dir/summary.json" ] && cp "$dir/summary.json" "_site/snapshots/$d/" || true
              [ -f "$dir/deltas.json" ] && cp "$dir/deltas.json" "_site/snapshots/$d/" || true
            done
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
